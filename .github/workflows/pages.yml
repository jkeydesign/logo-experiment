name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build
        env:
          GITHUB_PAGES: 'true'
          NEXT_PUBLIC_STATIC_EXPORT: 'true'
          NEXT_PUBLIC_GAS_URL: ${{ secrets.NEXT_PUBLIC_GAS_URL }}
          NEXT_PUBLIC_FIREBASE_API_KEY: AIzaSyBMONwh1FPKeXq-ExsrSZhcD9YdMhpVVrs
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ovbne-experiment.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ovbne-experiment
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ovbne-experiment.firebasestorage.app
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "1043329915526"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:1043329915526:web:c2e8c7f6856852eb708f07"


      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
